kind = "web"
previewPath = "/"
title = "Joe's Dumpsters"
version = "1.0.0"
id = "artifacts/joe-dumpsters"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18189

[services.development]
run = "pnpm --filter @workspace/joe-dumpsters run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/joe-dumpsters", "run", "build" ]
publicDir = "artifacts/joe-dumpsters/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18189"
BASE_PATH = "/"
